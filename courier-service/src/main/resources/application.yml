server:
  port: 8082

spring:
  application:
    name: courier-service
  datasource:
    url: jdbc:postgresql://localhost:5436/courier_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

jpa:
  hibernate:
    ddl-auto: none
  show-sql: true
  properties:
    hibernate:
      format_sql: true

liquibase:
  enabled: true
  change-log: classpath:db/changelog/db.changelog-master.xml