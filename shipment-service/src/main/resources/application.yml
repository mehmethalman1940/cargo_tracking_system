server:
  port: 8081

spring:
  application:
    name: shipment-service
  datasource:
    url: jdbc:postgresql://localhost:5435/shipment_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml